name: CI/CD
on:
  push:
    branches:
      - main
      - beta
      - 'renovate/**'
      - 'github-renovate/**'
  pull_request: null
jobs:
  lint-commit-messages:
    uses: vidavidorra/.github/.github/workflows/lint-commit-messages.yml@a75be3c145a19874465a07716a713a2f33453d0c # v8.1.17
  lint:
    uses: vidavidorra/.github/.github/workflows/node-lint.yml@a75be3c145a19874465a07716a713a2f33453d0c # v8.1.17
  build:
    uses: vidavidorra/.github/.github/workflows/node-build.yml@a75be3c145a19874465a07716a713a2f33453d0c # v8.1.17
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      - name: Test
        uses: renovatebot/github-action@79dc0ba74dc3de28db0a7aeb1d0b95d5bf5fde2a # v46.1.13
        with:
          configurationFile: .github/renovate-global.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: debug
          RENOVATE_DRY_RUN: full
          RENOVATE_REPOSITORIES: '["vidavidorra/renovate"]'
  release:
    needs:
      - lint-commit-messages
      - lint
      - build
      - test
    uses: vidavidorra/.github/.github/workflows/release.yml@a75be3c145a19874465a07716a713a2f33453d0c # v8.1.17
    secrets:
      privateKey: ${{ secrets.RELEASE_PRIVATE_KEY }}
