name: CI/CD
on:
  push:
    branches:
      - main
      - beta
      - 'renovate/**'
      - 'github-renovate/**'
  pull_request: null
jobs:
  lint-commit-messages:
    uses: vidavidorra/.github/.github/workflows/lint-commit-messages.yml@3b111a4ddfa043a3a1c2edb52488834492f98f57 # v8.1.21
  lint:
    uses: vidavidorra/.github/.github/workflows/node-lint.yml@3b111a4ddfa043a3a1c2edb52488834492f98f57 # v8.1.21
  build:
    uses: vidavidorra/.github/.github/workflows/node-build.yml@3b111a4ddfa043a3a1c2edb52488834492f98f57 # v8.1.21
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      - name: Test
        uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          configurationFile: .github/renovate-global.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: debug
          RENOVATE_DRY_RUN: full
          RENOVATE_REPOSITORIES: '["vidavidorra/renovate"]'
  release:
    needs:
      - lint-commit-messages
      - lint
      - build
      - test
    uses: vidavidorra/.github/.github/workflows/release.yml@3b111a4ddfa043a3a1c2edb52488834492f98f57 # v8.1.21
    secrets:
      privateKey: ${{ secrets.RELEASE_PRIVATE_KEY }}
