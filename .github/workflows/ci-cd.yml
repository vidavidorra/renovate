name: CI/CD
on:
  push:
    branches:
      - main
      - beta
      - 'renovate/**'
      - 'github-renovate/**'
  pull_request: null
jobs:
  lint-commit-messages:
    uses: vidavidorra/.github/.github/workflows/lint-commit-messages.yml@3767a4b7d83a343ab0a01e192c95fbfd40083d2e # v8.1.23
  lint:
    uses: vidavidorra/.github/.github/workflows/node-lint.yml@3767a4b7d83a343ab0a01e192c95fbfd40083d2e # v8.1.23
  build:
    uses: vidavidorra/.github/.github/workflows/node-build.yml@3767a4b7d83a343ab0a01e192c95fbfd40083d2e # v8.1.23
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      - name: Test
        uses: renovatebot/github-action@6d859fc95779be83a0335ca704879b47e5d79641 # v46.1.16
        with:
          configurationFile: .github/renovate-global.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: debug
          RENOVATE_DRY_RUN: full
          RENOVATE_REPOSITORIES: '["vidavidorra/renovate"]'
  release:
    needs:
      - lint-commit-messages
      - lint
      - build
      - test
    uses: vidavidorra/.github/.github/workflows/release.yml@3767a4b7d83a343ab0a01e192c95fbfd40083d2e # v8.1.23
    secrets:
      privateKey: ${{ secrets.RELEASE_PRIVATE_KEY }}
