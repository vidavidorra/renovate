name: CI/CD
on:
  push:
    branches:
      - main
      - beta
      - 'renovate/**'
      - 'github-renovate/**'
  pull_request: null
jobs:
  lint-commit-messages:
    uses: vidavidorra/.github/.github/workflows/lint-commit-messages.yml@33abc1beb87f9c69cae9bd055cb680c910a8b661 # v8.1.22
  lint:
    uses: vidavidorra/.github/.github/workflows/node-lint.yml@33abc1beb87f9c69cae9bd055cb680c910a8b661 # v8.1.22
  build:
    uses: vidavidorra/.github/.github/workflows/node-build.yml@33abc1beb87f9c69cae9bd055cb680c910a8b661 # v8.1.22
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      - name: Test
        uses: renovatebot/github-action@8217b3fc286df088d7c27f3255fe8414463bc0fd # v46.1.15
        with:
          configurationFile: .github/renovate-global.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: debug
          RENOVATE_DRY_RUN: full
          RENOVATE_REPOSITORIES: '["vidavidorra/renovate"]'
  release:
    needs:
      - lint-commit-messages
      - lint
      - build
      - test
    uses: vidavidorra/.github/.github/workflows/release.yml@33abc1beb87f9c69cae9bd055cb680c910a8b661 # v8.1.22
    secrets:
      privateKey: ${{ secrets.RELEASE_PRIVATE_KEY }}
