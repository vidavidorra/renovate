name: CI/CD
on:
  push:
    branches:
      - main
      - beta
      - 'renovate/**'
      - 'github-renovate/**'
  pull_request: null
jobs:
  lint-commit-messages:
    uses: vidavidorra/.github/.github/workflows/lint-commit-messages.yml@b0b683dfce1bfca9a89973eb2038658ed7ba4445 # v8.1.1
  lint:
    uses: vidavidorra/.github/.github/workflows/node-lint.yml@b0b683dfce1bfca9a89973eb2038658ed7ba4445 # v8.1.1
  build:
    uses: vidavidorra/.github/.github/workflows/node-build.yml@b0b683dfce1bfca9a89973eb2038658ed7ba4445 # v8.1.1
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      - name: Test
        uses: renovatebot/github-action@8d75b92f43899d483728e9a8a7fd44238020f6e6 # v46.1.2
        with:
          configurationFile: .github/renovate-global.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: debug
          RENOVATE_DRY_RUN: full
          RENOVATE_REPOSITORIES: '["vidavidorra/renovate"]'
  release:
    needs:
      - lint-commit-messages
      - lint
      - build
      - test
    uses: vidavidorra/.github/.github/workflows/release.yml@b0b683dfce1bfca9a89973eb2038658ed7ba4445 # v8.1.1
    secrets:
      privateKey: ${{ secrets.RELEASE_PRIVATE_KEY }}
