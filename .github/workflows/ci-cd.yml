name: CI/CD
on:
  push:
    branches:
      - main
      - beta
      - 'renovate/**'
      - 'github-renovate/**'
  pull_request: null
jobs:
  lint-commit-messages:
    uses: vidavidorra/.github/.github/workflows/lint-commit-messages.yml@7c42c71fbbfcb922794cb1c958b9471c1b9ef241 # v8.1.3
  lint:
    uses: vidavidorra/.github/.github/workflows/node-lint.yml@7c42c71fbbfcb922794cb1c958b9471c1b9ef241 # v8.1.3
  build:
    uses: vidavidorra/.github/.github/workflows/node-build.yml@7c42c71fbbfcb922794cb1c958b9471c1b9ef241 # v8.1.3
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      - name: Test
        uses: renovatebot/github-action@8ac70de2fe55752c573155866e30735411e3b61c # v41.0.22
        with:
          configurationFile: .github/renovate-global.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: debug
          RENOVATE_DRY_RUN: full
          RENOVATE_REPOSITORIES: '["vidavidorra/renovate"]'
  release:
    needs:
      - lint-commit-messages
      - lint
      - build
      - test
    uses: vidavidorra/.github/.github/workflows/release.yml@7c42c71fbbfcb922794cb1c958b9471c1b9ef241 # v8.1.3
    secrets:
      privateKey: ${{ secrets.RELEASE_PRIVATE_KEY }}
